<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIDS Dashboard - Network Intrusion Detection System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 40px;
            border-bottom: 2px solid #e94560;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #e94560;
            font-size: 28px;
        }

        .header .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #888;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: #e94560;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel h2 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alerts-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .alert-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid;
        }

        .alert-item.critical { border-left-color: #ff4757; }
        .alert-item.high { border-left-color: #ffa502; }
        .alert-item.medium { border-left-color: #1e90ff; }

        .alert-item .severity {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .alert-item.critical .severity { color: #ff4757; }
        .alert-item.high .severity { color: #ffa502; }
        .alert-item.medium .severity { color: #1e90ff; }

        .alert-item .details {
            font-size: 14px;
            color: #ccc;
        }

        .alert-item .time {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }

        .packets-table {
            width: 100%;
            border-collapse: collapse;
        }

        .packets-table th,
        .packets-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .packets-table th {
            color: #888;
            font-weight: normal;
            font-size: 13px;
            text-transform: uppercase;
        }

        .packets-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .protocol-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .protocol-badge.tcp { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .protocol-badge.udp { background: rgba(30, 144, 255, 0.2); color: #1e90ff; }
        .protocol-badge.icmp { background: rgba(255, 165, 2, 0.2); color: #ffa502; }

        .suspicious-ip {
            background: rgba(233, 69, 96, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suspicious-ip .ip {
            font-family: monospace;
            font-size: 16px;
            color: #e94560;
        }

        .suspicious-ip .info {
            font-size: 13px;
            color: #888;
        }

        .chart-container {
            height: 200px;
            margin-top: 20px;
        }

        .refresh-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #ff6b6b;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ NIDS Dashboard</h1>
        <div class="status">
            <div class="status-indicator"></div>
            <span>Live Monitoring</span>
            <button class="refresh-btn" onclick="refreshData()">Refresh</button>
        </div>
    </div>

    <div class="container">
        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Packets</h3>
                <div class="value" id="total-packets">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Alerts</h3>
                <div class="value" id="total-alerts">0</div>
            </div>
            <div class="stat-card">
                <h3>Suspicious IPs</h3>
                <div class="value" id="suspicious-count">0</div>
            </div>
            <div class="stat-card">
                <h3>Protocols</h3>
                <div class="value" id="protocol-count">0</div>
            </div>
        </div>

        <!-- Main Dashboard -->
        <div class="dashboard-grid">
            <!-- Recent Packets -->
            <div class="panel">
                <h2>📦 Recent Packets</h2>
                <table class="packets-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Source IP</th>
                            <th>Dest IP</th>
                            <th>Protocol</th>
                            <th>Src Port</th>
                            <th>Dst Port</th>
                        </tr>
                    </thead>
                    <tbody id="packets-body">
                        <tr><td colspan="6" style="text-align:center;color:#666;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Recent Alerts -->
            <div class="panel">
                <h2>🚨 Recent Alerts</h2>
                <div class="alerts-list" id="alerts-list">
                    <div style="text-align:center;color:#666;">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Bottom Row -->
        <div class="dashboard-grid">
            <!-- Suspicious IPs -->
            <div class="panel">
                <h2>⚠️ Top Suspicious IPs</h2>
                <div id="suspicious-ips">
                    <div style="text-align:center;color:#666;">Loading...</div>
                </div>
            </div>

            <!-- Traffic Stats -->
            <div class="panel">
                <h2>📊 Traffic Statistics</h2>
                <div id="traffic-stats">
                    <div style="text-align:center;color:#666;">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Base URL
        const API_BASE = '';

        // Format timestamp
        function formatTime(timestamp) {
            if (!timestamp) return 'N/A';
            const date = new Date(timestamp);
            return date.toLocaleTimeString();
        }

        // Get protocol badge class
        function getProtocolClass(protocol) {
            return protocol.toLowerCase();
        }

        // Load traffic stats
        async function loadTrafficStats() {
            try {
                const response = await fetch(`${API_BASE}/api/traffic/stats`);
                const data = await response.json();

                document.getElementById('total-packets').textContent = data.total_packets.toLocaleString();
                document.getElementById('protocol-count').textContent = Object.keys(data.by_protocol).length;

                // Render traffic stats
                const statsDiv = document.getElementById('traffic-stats');
                let html = '<div style="margin-bottom: 15px;">';
                html += '<h4 style="color:#888;margin-bottom:10px;">By Protocol</h4>';
                for (const [proto, count] of Object.entries(data.by_protocol)) {
                    html += `<div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                        <span>${proto}</span><span style="color:#e94560;">${count}</span>
                    </div>`;
                }
                html += '</div>';

                html += '<div>';
                html += '<h4 style="color:#888;margin-bottom:10px;">Top Ports</h4>';
                for (const [port, count] of Object.entries(data.top_ports).slice(0, 5)) {
                    html += `<div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                        <span>Port ${port}</span><span style="color:#00ff88;">${count}</span>
                    </div>`;
                }
                html += '</div>';

                statsDiv.innerHTML = html;
            } catch (error) {
                console.error('Error loading traffic stats:', error);
            }
        }

        // Load alerts
        async function loadAlerts() {
            try {
                const [alertsResponse, statsResponse] = await Promise.all([
                    fetch(`${API_BASE}/api/alerts/recent?limit=10`),
                    fetch(`${API_BASE}/api/alerts/stats`)
                ]);

                const alertsData = await alertsResponse.json();
                const statsData = await statsResponse.json();

                document.getElementById('total-alerts').textContent = statsData.total.toLocaleString();

                const alertsList = document.getElementById('alerts-list');
                
                if (alertsData.alerts.length === 0) {
                    alertsList.innerHTML = '<div style="text-align:center;color:#666;">No alerts detected</div>';
                    return;
                }

                let html = '';
                alertsData.alerts.forEach(alert => {
                    const severityClass = alert.severity.toLowerCase();
                    html += `<div class="alert-item ${severityClass}">
                        <div class="severity">${alert.severity} - ${alert.attack_type}</div>
                        <div class="details">${alert.details}</div>
                        <div class="time">Source: ${alert.attacker_ip} • ${formatTime(alert.timestamp)}</div>
                    </div>`;
                });

                alertsList.innerHTML = html;
            } catch (error) {
                console.error('Error loading alerts:', error);
            }
        }

        // Load packets
        async function loadPackets() {
            try {
                const response = await fetch(`${API_BASE}/api/packets/recent?limit=15`);
                const data = await response.json();

                const tbody = document.getElementById('packets-body');
                
                if (data.packets.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#666;">No packets captured</td></tr>';
                    return;
                }

                let html = '';
                data.packets.forEach(packet => {
                    const protoClass = getProtocolClass(packet.protocol);
                    html += `<tr>
                        <td style="color:#666;font-size:13px;">${formatTime(packet.timestamp)}</td>
                        <td style="font-family:monospace;">${packet.src_ip}</td>
                        <td style="font-family:monospace;">${packet.dst_ip}</td>
                        <td><span class="protocol-badge ${protoClass}">${packet.protocol}</span></td>
                        <td>${packet.src_port || '-'}</td>
                        <td>${packet.dst_port || '-'}</td>
                    </tr>`;
                });

                tbody.innerHTML = html;
            } catch (error) {
                console.error('Error loading packets:', error);
            }
        }

        // Load suspicious IPs
        async function loadSuspiciousIPs() {
            try {
                const response = await fetch(`${API_BASE}/api/suspicious/ips`);
                const data = await response.json();

                document.getElementById('suspicious-count').textContent = data.suspicious_ips.length;

                const container = document.getElementById('suspicious-ips');
                
                if (data.suspicious_ips.length === 0) {
                    container.innerHTML = '<div style="text-align:center;color:#666;">No suspicious activity detected</div>';
                    return;
                }

                let html = '';
                data.suspicious_ips.slice(0, 8).forEach(item => {
                    html += `<div class="suspicious-ip">
                        <div>
                            <div class="ip">${item.ip}</div>
                            <div class="info">${item.attack_types} • ${item.alert_count} alerts</div>
                        </div>
                        <div style="color:#666;font-size:12px;">Last: ${formatTime(item.last_seen)}</div>
                    </div>`;
                });

                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading suspicious IPs:', error);
            }
        }

        // Refresh all data
        function refreshData() {
            loadTrafficStats();
            loadAlerts();
            loadPackets();
            loadSuspiciousIPs();
        }

        // Initial load
        refreshData();

        // Auto-refresh every 5 seconds
        setInterval(refreshData, 5000);
    </script>
</body>
</html>
